<body class="bg-slate-50 min-h-screen font-sans text-slate-800 pb-10">

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Senha</label>

    <div id="main-app" class="hidden">
        <div class="max-w-6xl mx-auto p-4 sm:p-6 lg:p-8">

            <div id="view-dashboard" class="space-y-8">

                        <form id="coverage-form" class="space-y-4">

                                <option value="" disabled selected>Quem cobriu?</option>
                            </select>
                            <select id="input-covered" required class="w-full p-2 border rounded-lg bg-slate-50">
                                <option value="" disabled selected>Quem foi coberto?</option>
                            </select>
                            <div class="grid grid-cols-2 gap-2">
                                <input type="time" id="input-start" required class="p-2 border rounded-lg bg-slate-50">
                                <input type="time" id="input-end" required class="p-2 border rounded-lg bg-slate-50">
                            </div>
                            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold hover:bg-blue-700 transition-all">Registrar</button>
                        </form>
                    </div>

                    <div class="lg:col-span-2 bg-white rounded-2xl shadow-sm border border-slate-100 p-6 overflow-hidden">
                        <h3 class="text-lg font-semibold mb-4">Histórico Global</h3>

                            <table class="w-full text-left text-sm">
                                <thead class="bg-slate-50 text-slate-500 uppercase text-xs">
                                    <tr>
                                        <th class="p-3">Data</th>

                                <tbody id="history-table-body"></tbody>
                            </table>

                    </div>
                </div>
            </div>

            <div id="view-settings" class="hidden max-w-2xl mx-auto space-y-6">
                <div class="bg-white rounded-2xl p-6 border border-slate-100 shadow-sm">
                    <h3 class="text-xl font-bold mb-4">Cadastrar Funcionário</h3>
                    <form id="add-employee-form" class="flex gap-2">
                        <input type="text" id="new-employee-name" placeholder="Nome completo" required class="flex-1 p-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                        <button type="submit" class="bg-emerald-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-emerald-700">Adicionar</button>
                    </form>

                <div class="bg-white rounded-2xl p-6 border border-slate-100 shadow-sm">

                    <ul id="settings-employee-list" class="divide-y divide-slate-100">

    <div id="toast-container" class="fixed bottom-4 right-4 z-[300] flex flex-col gap-2"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, deleteDoc, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // CONFIGURAÇÃO DO SEU FIREBASE
        const firebaseConfig = {
          apiKey: "AIzaSyDkDdoylWPvyNcvSmO9tWcjSXB4ANrgs3o",
          authDomain: "comp-time-539a1.firebaseapp.com",
          projectId: "comp-time-539a1",
          storageBucket: "comp-time-539a1.firebasestorage.app",
          messagingSenderId: "850307341504",
          appId: "1:850307341504:web:8e75e347f2489e485a6125"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let employees = [];
        let transactions = [];

        // --- AUTH ---
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            const btn = document.getElementById('btn-login');
            const err = document.getElementById('login-error');

            btn.disabled = true;
            btn.innerHTML = "Autenticando...";
            
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (e) {
                err.innerHTML = "E-mail ou senha inválidos.";
                err.classList.remove('hidden');
                btn.disabled = false;
                btn.innerHTML = "Entrar no Sistema";
            }
        });

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('user-display').innerText = user.email;
                initDataSync();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        // --- DATA SYNC ---
        function initDataSync() {
            onSnapshot(collection(db, "funcionarios"), (snap) => {
                employees = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderEmployees();
                updateSelects();
            });

            const q = query(collection(db, "transacoes"), orderBy("timestamp", "desc"), limit(50));
            onSnapshot(q, (snap) => {
                transactions = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderHistory();
            });
        }

        // --- RENDERING ---
        function renderEmployees() {
            const grid = document.getElementById('employees-grid');
            const list = document.getElementById('settings-employee-list');
            grid.innerHTML = '';
            list.innerHTML = '';

            employees.forEach(emp => {
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex justify-between items-center";
                const balanceColor = emp.saldo > 0 ? 'text-emerald-600' : (emp.saldo < 0 ? 'text-rose-600' : 'text-slate-400');
                card.innerHTML = `
                    <div><h4 class="font-bold text-slate-700">${emp.nome}</h4><p class="text-xs text-slate-400 uppercase">Saldo Acumulado</p></div>
                    <div class="text-2xl font-black ${balanceColor}">${emp.saldo >= 0 ? '+' : ''}${emp.saldo.toFixed(1)}h</div>
                `;
                grid.appendChild(card);

                const li = document.createElement('li');
                li.className = "py-4 flex justify-between items-center";
                li.innerHTML = `
                    <span class="font-medium">${emp.nome}</span>
                    <button onclick="deleteEmployee('${emp.id}')" class="text-rose-500 hover:bg-rose-50 p-2 rounded-lg transition-all">Excluir</button>
                `;
                list.appendChild(li);
            });
        }

        function renderHistory() {
            const tbody = document.getElementById('history-table-body');
            tbody.innerHTML = '';
            transactions.forEach(tx => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-slate-50 hover:bg-slate-50";
                tr.innerHTML = `
                    <td class="p-3 text-slate-500">${tx.data}</td>
                    <td class="p-3"><span class="font-bold text-emerald-600">${tx.quemCobriu}</span> <span class="text-slate-300">➜</span> ${tx.quemFoiCoberto}</td>
                    <td class="p-3 font-bold">${tx.horas.toFixed(1)}h</td>
                    <td class="p-3 text-right"><button onclick="deleteTransaction('${tx.id}', '${tx.idCoverer}', '${tx.idCovered}', ${tx.horas})" class="text-slate-300 hover:text-rose-500">Remover</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        // --- FUNÇÃO ATUALIZADA AQUI ---
        function updateSelects() {
            const sel1 = document.getElementById('input-coverer');
            const sel2 = document.getElementById('input-covered');
            const options = employees.map(e => `<option value="${e.id}">${e.nome}</option>`).join('');
            
            // Define o texto descritivo correto para cada campo
            sel1.innerHTML = `<option value="" disabled selected>Quem cobriu?</option>` + options;
            sel2.innerHTML = `<option value="" disabled selected>Quem foi coberto?</option>` + options;
        }

        // --- ACTIONS ---
        window.toggleView = (view) => {
            document.getElementById('view-dashboard').classList.toggle('hidden', view !== 'dashboard');
            document.getElementById('view-settings').classList.toggle('hidden', view !== 'settings');
        };

        document.getElementById('add-employee-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nome = document.getElementById('new-employee-name').value;
            await addDoc(collection(db, "funcionarios"), { nome, saldo: 0 });
            document.getElementById('add-employee-form').reset();
            showNotification("Funcionário adicionado!");
        });

        window.deleteEmployee = async (id) => {
            if (confirm("Deseja realmente excluir este funcionário?")) {
                await deleteDoc(doc(db, "funcionarios", id));
            }
        };

        document.getElementById('coverage-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const idCoverer = document.getElementById('input-coverer').value;
            const idCovered = document.getElementById('input-covered').value;
            const start = document.getElementById('input-start').value;
            const end = document.getElementById('input-end').value;
            
            if (idCoverer === idCovered) return showNotification("Não pode cobrir a si mesmo!", "error");

            const [h1, m1] = start.split(':').map(Number);
            const [h2, m2] = end.split(':').map(Number);
            let diff = (h2 + m2/60) - (h1 + m1/60);
            if (diff < 0) diff += 24;

            const coverer = employees.find(e => e.id === idCoverer);
            const covered = employees.find(e => e.id === idCovered);

            await addDoc(collection(db, "transacoes"), {
                data: document.getElementById('input-date').value,
                idCoverer, quemCobriu: coverer.nome,
                idCovered, quemFoiCoberto: covered.nome,
                horas: diff,
                timestamp: Date.now()
            });

            await setDoc(doc(db, "funcionarios", idCoverer), { saldo: coverer.saldo + diff }, { merge: true });
            await setDoc(doc(db, "funcionarios", idCovered), { saldo: covered.saldo - diff }, { merge: true });

            document.getElementById('coverage-form').reset();
            showNotification("Registro salvo!");
        });

        window.deleteTransaction = async (txId, idCoverer, idCovered, horas) => {
            if (confirm("Remover este registro e estornar as horas?")) {
                const coverer = employees.find(e => e.id === idCoverer);
                const covered = employees.find(e => e.id === idCovered);

                if (coverer) await setDoc(doc(db, "funcionarios", idCoverer), { saldo: coverer.saldo - horas }, { merge: true });
                if (covered) await setDoc(doc(db, "funcionarios", idCovered), { saldo: covered.saldo + horas }, { merge: true });
                
                await deleteDoc(doc(db, "transacoes", txId));
                showNotification("Registro removido.");
            }
        };

        window.showNotification = (msg, type = 'success') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `${type === 'success' ? 'bg-emerald-600' : 'bg-rose-600'} text-white px-6 py-3 rounded-xl shadow-lg`;
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        };

        document.getElementById('input-date').valueAsDate = new Date();
    </script>
</body>
</html>
